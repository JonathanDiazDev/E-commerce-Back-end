name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests -B

      - name: Run unit tests
        run: ./mvnw test -B "-Dtest=AuthServiceTest,InventoryServiceTest,PasswordResetServiceImplTest,ProductServiceTest" "-DfailIfNoTests=false"

      - name: Build Docker image
        run: docker build -t ecommerce-backend:${{ github.sha }} .