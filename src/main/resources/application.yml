spring:
  application:
    name: ecommerce-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5444}/${DB_NAME:ecommerce}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    # Asegura que Hibernate env�e las fechas en UTC
    jdbc:
      time_zone: UTC

  # Configuraci�n para Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 60000

security:
  jwt:
    secret-key: ${JWT_ACCESS_TOKEN:}
    access-token-expiration: 3600000
    refresh-token-expiration: 86400000