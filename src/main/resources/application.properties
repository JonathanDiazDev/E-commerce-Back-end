spring.application.name=ecommerce-backend

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5444}/${DB_NAME:ecommerce}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

# Configuracion de Seguridad JWT
security.jwt.secret-key=una_clave_muy_larga_de_minimo_32_bytes_123456
security.jwt.access-token-expiration=3600000
# Si tu codigo tambien usa refresh tokens, agrega esta por si acaso:
security.jwt.refresh-token-expiration=86400000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true