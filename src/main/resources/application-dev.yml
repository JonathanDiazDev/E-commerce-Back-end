spring:
  application:
    name: ecommerce-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5444}/${DB_NAME:ecommerce}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    Hikari:
      maximum-pool-size: 10 # Número máximo de conexiones abiertas
      minimum-idle: 5      # Conexiones mínimas siempre listas
      idle-timeout: 300000 # 5 minutos
      connection-timeout: 20000

  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create
      format_sql: true
      jdbc:
        time_zone: UTC
    show-sql: true
    properties:
      hibernate:
  sql:
    init:
      mode: always

  # Configuraci�n para Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 60000

security:
  jwt:
    secret-key: ${JWT_ACCESS_TOKEN:}
    access-token-expiration: 3600000
    refresh-token-expiration: 86400000

rate-limiting:
  api:
    USER:
      limit: 100
      window: 60 # segundos
    ADMIN:
      limit: 1000
      window: 60